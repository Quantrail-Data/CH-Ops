name: Close External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Origin
        id: check_author
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const repoOwner = context.repo.owner;
            
            // Check if the PR is from a fork (external) vs an internal branch
            const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;
            
            if (isFork) {
              // 1. Leave an explanation comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: "⚠️ **Automated Message:** This repository does not accept external Pull Requests yet. Please see [CONTRIBUTING.md](https://github.com/" + context.repo.owner + "/" + context.repo.repo + "/blob/main/CONTRIBUTING.md) for why, and what we welcome instead (bug reports and feature requests as Issues). Closing this PR."
              });

              // 2. Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: "closed"
              });
            }
