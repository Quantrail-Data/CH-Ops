name: Close External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Origin
        id: check_author
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repoOwner = context.repo.owner;
            
            // Check if the PR is from a fork (external) vs an internal branch
            const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;
            
            if (isFork) {
              // 1. Leave an explanation comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: "⚠️ **Automated Message:** This repository does not accept external Pull Requests. Code contributions are restricted to internal employees. If you have found a bug or have a feature request, please open a standard GitHub Issue instead. Closing this PR."
              });

              // 2. Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: "closed"
              });
            }
