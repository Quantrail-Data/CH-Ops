name: Run Unit Tests

on:
  push:
    branches: [ main, testing ]        # replace "testing" with your real branch name
  pull_request:
    branches: [ main, testing ]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  # Dummy values for unit tests only. Not real credentials.
  SUPER_ADMIN_1: test-admin
  SUPER_ADMIN_1_PASSWORD: test-password-123
  SESSION_SECRET: test-session-secret

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Dependencies
        run: bun install

      # Step 4: Run the test suite with coverage
      - name: Run Tests with Coverage
        run: set -o pipefail && bun run test:coverage 2>&1

      - name: Run Lint
        run: bun run lint
        continue-on-error: true

      # Step 5: Post coverage summary + patch coverage as a PR comment
      - name: Generate coverage report
        if: always() && github.event_name == 'pull_request'
        env:
          COVERAGE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          COVERAGE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/coverage-report.mjs > coverage-comment.md

      - name: Comment coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage-comment.md')) return;
            const body = fs.readFileSync('coverage-comment.md', 'utf8');
            const marker = '<!-- coverage-report-bot -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
