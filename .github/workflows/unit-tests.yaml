name: Run Unit Tests

on:
  push:
    branches: [ main, testing ]        # replace "testing" with your real branch name
  pull_request:
    branches: [ main, testing ]

permissions:
  contents: read
  actions: read
  checks: write

env:
  # Dummy values for unit tests only. Not real credentials.
  SUPER_ADMIN_1: test-admin
  SUPER_ADMIN_1_PASSWORD: test-password-123
  SESSION_SECRET: test-session-secret

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Dependencies
        run: bun install

      - name: Run Tests
        run: bun run test

      - name: Run Lint
        run: bun run lint
        continue-on-error: true
