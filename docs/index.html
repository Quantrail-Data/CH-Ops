    /* Dark - exact match to CHOps dark mode */

      background-attachment: fixed;
    }

    body.dark-mode .sidebar {
      background: rgba(8, 12, 24, 0.25);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border-right: 1px solid rgba(30, 41, 66, 0.25);
    }

    body.dark-mode .sidebar-nav a {
      color: #94a3b8;
    }

    body.dark-mode .sidebar-nav a:hover {

    }

    body.dark-mode .sidebar-nav a.active {
      color: #f0f4f8;
      font-weight: 600;
    }

    body.dark-mode .sidebar .app-name-link {

      -webkit-background-clip: text;

    body.dark-mode .markdown-section {

    body.dark-mode .markdown-section pre {

      border: 1px solid rgba(51, 65, 95, 0.4);
      border-radius: 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    body.dark-mode .markdown-section pre code {
      color: #f5f7fa;

    }
 body.dark-mode .markdown-section table th {

    body.dark-mode .markdown-section blockquote {

    }

    body.dark-mode .search .matching-post:hover {

    body.dark-mode .token.comment {

    }

    body.dark-mode .token.keyword {

    body.dark-mode .token.string {

    body.dark-mode .token.number {

    body.dark-mode .token.function {

    body.dark-mode .token.operator {

    }

      -webkit-backdrop-filter: blur(40px) saturate(1.3);
      border-right: 1px solid rgba(0, 0, 0, 0.04);

    body:not(.dark-mode) .sidebar-nav a {

    }

    body:not(.dark-mode) .sidebar-nav a:hover {

    }

    body:not(.dark-mode) .sidebar-nav a.active {
      color: #1a1a2e;
      font-weight: 600;
    }

    body:not(.dark-mode) .sidebar .app-name-link {
      color: transparent;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
    }

    body:not(.dark-mode) .markdown-section {
      color: #111827;
    }

    body:not(.dark-mode) .markdown-section h1,
    body:not(.dark-mode) .markdown-section h2,
    body:not(.dark-mode) .markdown-section h3 {
      color: #111827;
    }

    body:not(.dark-mode) .markdown-section a {
      color: #6366f1;
    }

    body:not(.dark-mode) .markdown-section a:hover {

    }

    body:not(.dark-mode) .markdown-section strong {

    }

    body:not(.dark-mode) .markdown-section code:not([class*="lang-"]) {

      color: #111827;

    body:not(.dark-mode) .markdown-section pre {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 8px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    body:not(.dark-mode) .markdown-section pre code {
      color: #111827;
      background: none;
      border: none;
    }

    body:not(.dark-mode) .markdown-section table th {
      background: rgba(255, 255, 255, 0.4);
      color: #111827;
      border-color: rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    body:not(.dark-mode) .markdown-section table td {
      border-color: rgba(0, 0, 0, 0.06);
      color: #374151;
    }

    body:not(.dark-mode) .markdown-section table tr:hover td {
      background: rgba(0, 0, 0, 0.02);
    }

    body:not(.dark-mode) .markdown-section blockquote {
      border-left: 3px solid #6366f1;
      color: #6b7280;
      background: rgba(99, 102, 241, 0.04);
      padding: 12px 16px;
      border-radius: 0 6px 6px 0;
    }

    body:not(.dark-mode) .markdown-section hr {
      border-color: rgba(0, 0, 0, 0.06);
    }

    body:not(.dark-mode) .markdown-section li {

    }

    body:not(.dark-mode) .search input {

      color: #111827;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 6px;
    }

    body:not(.dark-mode) .token.comment {
      color: #6b7280;
    }

    body:not(.dark-mode) .token.keyword {
      color: #7c3aed;
      font-weight: 600;
    }

    body:not(.dark-mode) .token.string {
      color: #16a34a;
    }

    body:not(.dark-mode) .token.number {
      color: #0891b2;
    }

    body:not(.dark-mode) .token.function {
      color: #2563eb;
    }

    body:not(.dark-mode) .token.operator {

    }

    body:not(.dark-mode) .token.variable {

    }

    body:not(.dark-mode) ::selection {

    /* Theme toggle - glass button */
    .theme-toggle {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      transition: all 0.2s ease;
    }

    body:not(.dark-mode) .theme-toggle {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(0, 0, 0, 0.06);
      color: #374151;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    body:not(.dark-mode) .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    body.dark-mode .theme-toggle {
      background: rgba(22, 30, 52, 0.45);
      border: 1px solid rgba(51, 65, 95, 0.3);
      color: #f5f7fa;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    body.dark-mode .theme-toggle:hover {
      background: rgba(55, 65, 95, 0.4);
    }

    body.dark-mode .sidebar-toggle .sidebar-toggle-button {
      background: var(--theme-color);
      color:white;
    }

    .content {
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
    }

    /* Caret indicators for collapsible sidebar sections.
       Docsify renders parent sections as <li class="folder">Label<ul>...</ul></li>
       with the label as a bare text node (no <a>/<p>). The collapse plugin adds
       the class "collapse" when the section is currently collapsed and removes it
       when expanded. We draw the caret as a ::before on the folder <li> and flip
       it based on the presence of the "collapse" class. */
    .sidebar-nav li.folder {
      position: relative;
      padding-left: 1.1em;
      cursor: pointer;
      list-style: none;
    }

    .sidebar-nav li.folder::before {
      content: "\203A"; /* › */
      position: absolute;
      left: 0.15em;
      top: 0.18em;
      font-size: 1.15em;
      line-height: 1.2;
      opacity: 0.6;
      transition: transform 0.15s ease;
      transform-origin: center;
    }

    /* Expanded folders carry the "open" class -> caret points down.
       Default (collapsed, no "open") stays pointing right. This matches the
       plugin's real state classes: "open folder" when expanded, plain "folder"
       or "folder collapse" when not. */
    .sidebar-nav li.folder.open::before {
      transform: rotate(90deg);
    }

    /* Nested folders sit one level in; nudge their caret to align */
    .sidebar-nav li.folder .folder {
      padding-left: 1.1em;
    }
  </style>
</head>

<body>
  <button class="theme-toggle" onclick="toggleDocsTheme()" title="Toggle dark/light mode"
    id="docs-theme-btn">&#9790;</button>
  <div id="app"></div>
  <script>
    function applyDocsTheme(dark) {
      document.body.classList.toggle('dark-mode', dark);
      var btn = document.getElementById('docs-theme-btn');
      btn.innerHTML = dark ? '&#9728;' : '&#9790;';
    }
    function toggleDocsTheme() {
      var isDark = document.body.classList.contains('dark-mode');
      applyDocsTheme(!isDark);
      try { localStorage.setItem('chadmin_docs_theme', isDark ? 'light' : 'dark'); } catch { }
    }
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('chadmin_docs_theme') || localStorage.getItem('chadmin_theme'); } catch { }
      applyDocsTheme(saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches));
    })();
    window.$docsify = {
      name: 'CHOps',
      repo: '',
      basePath: '/docs/',
      loadSidebar: true,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1,
      auto2top: true,
      search: { placeholder: 'Search documentation', noData: 'No results found.', paths: 'auto' },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse@1/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
</body>
